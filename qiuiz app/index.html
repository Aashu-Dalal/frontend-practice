<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container{
            width: 60vw;
            border: 2px solid black;
            border-radius: 15px;
            margin: 10px;
            font-size:larger;
            padding: 50px 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            background-color: rgb(152, 180, 152);
        }
        .container button{
            padding: 15px 20px;
            cursor: pointer;
            background-color: green;
            border-radius: 7px ;
            font-size: 14px;
            color: white;
        }
        .container p{
            font-size: 25px;
        }
        .temp{
            border: 2px solid black;
            width: 60vw;
            box-sizing: border-box;
            height: 300px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quiz App</h1>
        <p>Welcome to the Quiz App!</p>
        <button id="start">Start Quiz</button>
    </div>
    <div class="temp" style="display: none;" id="quizBox">
        <h2 id="question">Question</h2>
        <div>
            <input type="radio" name="option" id="opt1">
            <label for="opt1" id="label1"></label>
        </div>
        <div>
            <input type="radio" name="option" id="opt2">
            <label for="opt2" id="label2"></label>
        </div>
        <div>
            <input type="radio" name="option" id="opt3">
            <label for="opt3" id="label3"></label>
        </div>
        <div>
            <input type="radio" name="option" id="opt4">
            <label for="opt4" id="label4"></label>
        </div>
        <button id="next">Next</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
