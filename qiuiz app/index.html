<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container{
            width: 50vw;
            border: 2px solid black;
            border-radius: 15px;
            margin: 10px;
            font-size:larger;
            padding: 50px 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgb(152, 180, 152);
        }
        .container button{
            padding: 15px 20px;
            cursor: pointer;
            background-color: green;
            border-radius: 7px ;
            font-size: 14px;
            color: white;
        }
        .container p{
            font-size: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quiz App</h1>
        <p>Welcome to the Quiz App!</p>
        <button>Start Quiz</button>
    </div>
</body>
</html>
