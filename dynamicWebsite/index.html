<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Website Builder</title>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container{
            align-items: center;
            justify-content: center;
             display: flex;
             flex-direction: column;
             gap: 20px;
        }
        .image img{
            width: 200px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image"><img src="thumbnail.jpg" alt="thumbnail"></div>
        <div class="title"></div>
        <div class="info"></div>
    </div>
</body>
</html>
