<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Website Builder</title>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
             background-color: rgb(240, 240, 240);
        }
        .container{
            width: 95%;
            background-color: red;
            box-sizing: border-box;
            margin: auto;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .image img{
            width: 200px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="image"><img src="thumbnail.jpg" alt="thumbnail"></span>
        <span class="title"></span>
        <div class="info"></div>
    </div>
</body>
</html>
